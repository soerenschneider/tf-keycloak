version: '3'
services:

  nginx:
    links:
      - oauth2
    image: nginx:1.18
    ports:
      - "8000:80"

  oauth2:
    image: quay.io/oauth2-proxy/oauth2-proxy
    links:
      - nginx
    depends_on:
      - keycloak
    ports:
      - "4180:4180"
    environment:
      - OAUTH2_PROXY_COOKIE_SECRET=bananenbrothahaa
      - OAUTH2_PROXY_CLIENT_ID=nginx
      - OAUTH2_PROXY_CLIENT_SECRET=iAAND3HSOHgGq242iZPsX4seSS4mcggu
      - OAUTH2_PROXY_EMAIL_DOMAINS=soerensoerensen.de
      - OAUTH2_PROXY_OIDC_ISSUER_URL=http://localhost:8080/auth/realms/gondor
      - OAUTH2_PROXY_UPSTREAMS=http://nginx:8000
      - OAUTH2_PROXY_HTTP_ADDRESS=http://0.0.0.0:4180

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    links:
      - oauth2
    environment:
      KEYCLOAK_USER: admin
      KEYCLOAK_PASSWORD: password
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
